<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed · SmartPaper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; color: #1f2937;
    }
    .card {
      background: #fff; border-radius: 20px; padding: 44px 32px; max-width: 420px;
      width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(79,70,229,0.10);
      border: 1px solid #eef2ff;
    }
    .check {
      width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 50%;
      background: #ecfdf5; display: flex; align-items: center; justify-content: center;
      font-size: 38px;
    }
    h1 { font-size: 1.5rem; font-weight: 800; color: #4F46E5; margin-bottom: 10px; }
    p { font-size: 0.98rem; line-height: 1.6; color: #4b5563; }
    .note { margin-top: 18px; font-size: 0.85rem; color: #9ca3af; }
    .brand { margin-top: 28px; font-size: 0.8rem; color: #9ca3af; }
    .brand a { color: #6366f1; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Email confirmed!</h1>
    <p>
      Your email address has been verified. You can now <strong>return to the SmartPaper app
      and sign in</strong> to start your child's personalised practice.
    </p>
    <p class="note">You can safely close this tab.</p>
    <div class="brand">📄 <strong>SmartPaper</strong> · <a href="https://sagarjilka.com/smartpaper/">smartpaper</a></div>
  </div>
</body>
</html>
